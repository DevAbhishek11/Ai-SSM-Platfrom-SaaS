openapi: 3.0.3
info:
  title: AI Social Media Management Platform API
  version: 0.1.0
  description: Initial REST contract for the enterprise social media management SaaS.
servers:
  - url: http://localhost:4000/api
security:
  - bearerAuth: []
  - apiKeyAuth: []
paths:
  /auth/login:
    post:
      tags: [auth]
      summary: Issue a short-lived access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        "201":
          description: Token response
        "401":
          description: Invalid credentials
  /auth/session:
    get:
      tags: [auth]
      summary: Validate bearer token and return principal
      responses:
        "200":
          description: Caller principal
        "401":
          description: Missing or invalid bearer token
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: API is alive
  /ready:
    get:
      tags: [health]
      summary: Readiness probe
      security: []
      responses:
        "200":
          description: API dependencies are configured
  /dashboard/overview:
    get:
      tags: [dashboard]
      summary: Workspace dashboard overview
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dashboard metrics, posts, accounts, trends, and alerts
  /workspaces:
    get:
      tags: [workspaces]
      summary: List caller workspaces
      responses:
        "200":
          description: Workspace list
  /workspaces/{id}:
    get:
      tags: [workspaces]
      summary: Get workspace
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace
        "404":
          description: Workspace not found
  /members:
    get:
      tags: [members]
      summary: List workspace team members
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Team members
  /members/invitations:
    get:
      tags: [members]
      summary: List workspace invitations
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace invitations
    post:
      tags: [members]
      summary: Invite a workspace member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMember"
      responses:
        "201":
          description: Created invitation and one-time accept URL
  /members/invitations/{id}/resend:
    post:
      tags: [members]
      summary: Resend a pending invitation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Refreshed invitation and one-time accept URL
  /members/invitations/{id}/revoke:
    post:
      tags: [members]
      summary: Revoke a pending invitation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Revoked invitation
  /members/{memberId}/role:
    post:
      tags: [members]
      summary: Update a member role
      parameters:
        - in: path
          name: memberId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRole"
      responses:
        "201":
          description: Updated member
  /members/{memberId}/suspend:
    post:
      tags: [members]
      summary: Suspend a team member
      parameters:
        - in: path
          name: memberId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Suspended member
  /api-keys:
    get:
      tags: [api-keys]
      summary: List workspace API keys without raw secrets
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: API key metadata
    post:
      tags: [api-keys]
      summary: Create a scoped API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKey"
      responses:
        "201":
          description: API key metadata and one-time raw secret
  /api-keys/{id}/revoke:
    post:
      tags: [api-keys]
      summary: Revoke an active API key
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Revoked API key metadata
  /identity/sso-connections:
    get:
      tags: [identity]
      summary: List workspace SSO connections
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace SSO connection list
    post:
      tags: [identity]
      summary: Create an enterprise SSO connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSsoConnection"
      responses:
        "201":
          description: Draft SSO connection
  /identity/sso-connections/{id}/test:
    post:
      tags: [identity]
      summary: Test and activate an SSO connection
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Activated SSO connection with test timestamp
  /identity/sso-connections/{id}/disable:
    post:
      tags: [identity]
      summary: Disable an SSO connection
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Disabled SSO connection
  /identity/sessions:
    get:
      tags: [identity]
      summary: List authentication sessions
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Authentication sessions
  /identity/sessions/{id}/revoke:
    post:
      tags: [identity]
      summary: Revoke an authentication session
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Revoked authentication session
  /identity/devices:
    get:
      tags: [identity]
      summary: List trusted devices
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Trusted and pending devices
  /identity/devices/{id}/trust:
    post:
      tags: [identity]
      summary: Trust a pending device
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrustDevice"
      responses:
        "201":
          description: Trusted device
  /identity/devices/{id}/revoke:
    post:
      tags: [identity]
      summary: Revoke a device and active sessions for that device
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Revoked device
  /posts:
    get:
      tags: [posts]
      summary: List workspace posts
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Post list
    post:
      tags: [posts]
      summary: Create a post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePost"
      responses:
        "201":
          description: Created post
        "400":
          description: Invalid platform content
  /campaigns:
    get:
      tags: [campaigns]
      summary: List workspace campaigns
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Campaign list with operational summaries
  /campaigns/{id}:
    get:
      tags: [campaigns]
      summary: Get campaign details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Campaign details
        "404":
          description: Campaign not found
  /campaigns/{id}/milestones:
    get:
      tags: [campaigns]
      summary: List campaign milestones
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Campaign milestones
  /campaigns/milestones/{milestoneId}/complete:
    post:
      tags: [campaigns]
      summary: Complete a campaign milestone
      parameters:
        - in: path
          name: milestoneId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Completed milestone
  /campaigns/{id}/tasks:
    get:
      tags: [campaigns]
      summary: List campaign tasks
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Campaign tasks
    post:
      tags: [campaigns]
      summary: Create a campaign task
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignTask"
      responses:
        "201":
          description: Created campaign task
  /campaigns/tasks/{taskId}/status:
    post:
      tags: [campaigns]
      summary: Update a campaign task status
      parameters:
        - in: path
          name: taskId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignTaskStatus"
      responses:
        "201":
          description: Updated campaign task
  /campaigns/{id}/budget:
    get:
      tags: [campaigns]
      summary: Campaign budget lines and utilization
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Budget lines, allocated/spent totals, remaining budget, and utilization
  /campaigns/{id}/budget-lines:
    post:
      tags: [campaigns]
      summary: Create or update a campaign budget line
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertCampaignBudgetLine"
      responses:
        "201":
          description: Created or updated budget line
  /campaigns/{id}/reports:
    get:
      tags: [campaigns]
      summary: List generated campaign reports
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Campaign reports
  /campaigns/{id}/reports/generate:
    post:
      tags: [campaigns]
      summary: Generate a campaign report
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateCampaignReport"
      responses:
        "201":
          description: Generated campaign report with metrics and insights
  /reports/templates:
    get:
      tags: [reports]
      summary: List report templates
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Report templates
    post:
      tags: [reports]
      summary: Create a report template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportTemplate"
      responses:
        "201":
          description: Created report template
  /reports/schedules:
    get:
      tags: [reports]
      summary: List scheduled reports
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Scheduled reports
    post:
      tags: [reports]
      summary: Create a scheduled report delivery
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScheduledReport"
      responses:
        "201":
          description: Created scheduled report
  /reports/exports:
    get:
      tags: [reports]
      summary: List report exports
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Report exports
    post:
      tags: [reports]
      summary: Create an on-demand report export
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportExport"
      responses:
        "201":
          description: Ready report export with payload metadata
  /reports/share-links:
    get:
      tags: [reports]
      summary: List report share links
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Active, revoked, and expired share links
  /reports/exports/{exportId}/share-links:
    post:
      tags: [reports]
      summary: Create a secure report share link
      parameters:
        - in: path
          name: exportId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportShareLink"
      responses:
        "201":
          description: Created report share link
  /media/assets:
    get:
      tags: [media]
      summary: List workspace media assets
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Media assets
  /media/upload-intents:
    post:
      tags: [media]
      summary: Create an upload intent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId, fileName, fileType, fileSize]
              properties:
                workspaceId:
                  type: string
                  format: uuid
                fileName:
                  type: string
                fileType:
                  type: string
                fileSize:
                  type: integer
      responses:
        "201":
          description: Constrained upload URL and required headers
  /media/processing-jobs:
    get:
      tags: [media]
      summary: List media processing jobs
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Media processing job list
  /media/uploads/complete:
    post:
      tags: [media]
      summary: Complete an upload and create a processing job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uploadIntentId, checksumSha256]
              properties:
                uploadIntentId:
                  type: string
                  format: uuid
                checksumSha256:
                  type: string
      responses:
        "201":
          description: Created processing job
  /media/processing-jobs/{id}/process-next:
    post:
      tags: [media]
      summary: Advance a media processing job by one step
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated processing job
  /media/processing-jobs/{id}/fail:
    post:
      tags: [media]
      summary: Mark a media processing job as failed
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [errorMessage]
              properties:
                errorMessage:
                  type: string
                step:
                  type: string
      responses:
        "200":
          description: Failed processing job
  /notifications:
    get:
      tags: [notifications]
      summary: List user notifications
      parameters:
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notifications
  /notifications/preferences:
    get:
      tags: [notifications]
      summary: Get notification preferences
      parameters:
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User notification preferences
    patch:
      tags: [notifications]
      summary: Update notification preferences
      parameters:
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationPreferences"
      responses:
        "200":
          description: Updated notification preferences
  /notifications/deliveries:
    get:
      tags: [notifications]
      summary: List notification delivery attempts
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Delivery attempts
  /notifications/route:
    post:
      tags: [notifications]
      summary: Create and route a notification through enabled channels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteNotification"
      responses:
        "201":
          description: Notification and delivery attempts
  /notifications/{id}/read:
    patch:
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated notification
  /billing/plans:
    get:
      tags: [billing]
      summary: Plan limits and capabilities
      responses:
        "200":
          description: Pricing plan matrix
  /billing/usage:
    get:
      tags: [billing]
      summary: Workspace usage against plan limits
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace usage
  /billing/entitlements/check:
    get:
      tags: [billing]
      summary: Check projected workspace entitlement
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
        - in: query
          name: capability
          required: true
          schema:
            type: string
            enum: [workspaces, socialAccounts, postsThisMonth, aiGenerations, teamMembers, mediaStorageGb, apiAccess]
        - in: query
          name: increment
          schema:
            type: number
      responses:
        "200":
          description: Allowed/denied entitlement decision with current and projected usage
        "400":
          description: Invalid capability
  /webhooks/deliveries:
    get:
      tags: [webhooks]
      summary: List webhook deliveries
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Webhook deliveries
  /webhooks/deliveries/{id}/replay:
    post:
      tags: [webhooks]
      summary: Replay a pending or failed webhook delivery
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Delivery queued for replay
  /publishing/jobs:
    get:
      tags: [publishing]
      summary: List publishing jobs
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Publishing jobs with retry and connector state
  /publishing/jobs/enqueue:
    post:
      tags: [publishing]
      summary: Create idempotent publishing jobs for a post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId, postId]
              properties:
                workspaceId:
                  type: string
                  format: uuid
                postId:
                  type: string
                  format: uuid
                socialAccountIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                publishAt:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Created or existing publishing jobs
  /publishing/jobs/process-due:
    post:
      tags: [publishing]
      summary: Process due queued and retrying publishing jobs
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Processed job results
  /publishing/jobs/{id}/process:
    post:
      tags: [publishing]
      summary: Process a single publishing job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated publishing job
  /publishing/jobs/{id}/retry:
    post:
      tags: [publishing]
      summary: Schedule a failed publishing job for retry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Publishing job scheduled for retry
  /workflow/posts/{postId}/timeline:
    get:
      tags: [workflow]
      summary: Get comments and workflow events for a post
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workflow timeline
  /workflow/posts/{postId}/submit:
    post:
      tags: [workflow]
      summary: Submit a draft post for review
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowComment"
      responses:
        "200":
          description: Updated post and timeline
  /workflow/posts/{postId}/approve:
    post:
      tags: [workflow]
      summary: Approve a post
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowComment"
      responses:
        "200":
          description: Updated post and timeline
  /workflow/posts/{postId}/request-changes:
    post:
      tags: [workflow]
      summary: Request changes on a post
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowComment"
      responses:
        "200":
          description: Updated post and timeline
  /workflow/posts/{postId}/schedule:
    post:
      tags: [workflow]
      summary: Schedule an approved post
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scheduledAt]
              properties:
                scheduledAt:
                  type: string
