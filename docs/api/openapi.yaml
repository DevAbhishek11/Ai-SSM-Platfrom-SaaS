components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    CreatePost:
      type: object
      required: [workspaceId, content]
      properties:
        workspaceId:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, in_review, revisions_needed, approved, scheduled, publishing, published, failed, archived]
        scheduledAt:
          type: string
          format: date-time
        aiGenerated:
          type: boolean
        content:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PostContentVariant"
    PostContentVariant:
      type: object
      required: [platform, text]
      properties:
        platform:
          type: string
          enum: [x, instagram, facebook, linkedin, youtube, tiktok, reddit, pinterest, threads, mastodon, bluesky]
        text:
          type: string
          maxLength: 65000
        hashtags:
          type: array
          items:
            type: string
        firstComment:
          type: string
        link:
          type: string
          format: uri
    InviteMember:
      type: object
      required: [workspaceId, email, role]
      properties:
        workspaceId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [owner, admin, manager, creator, reviewer, viewer, api_service_account]
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 30
    UpdateMemberRole:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [owner, admin, manager, creator, reviewer, viewer, api_service_account]
    CreateApiKey:
      type: object
      required: [workspaceId, name, scopes]
      properties:
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        scopes:
          type: array
          minItems: 1
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
    CreateSsoConnection:
      type: object
      required: [workspaceId, providerType, domain, entityId, ssoUrl, certificateFingerprint]
      properties:
        workspaceId:
          type: string
          format: uuid
        providerType:
          type: string
          enum: [saml, oidc, google_workspace, azure_ad, okta]
        domain:
          type: string
          maxLength: 180
        entityId:
          type: string
          maxLength: 500
        ssoUrl:
          type: string
          format: uri
        certificateFingerprint:
          type: string
          minLength: 8
        metadata:
          type: object
          additionalProperties: true
    TrustDevice:
      type: object
      properties:
        name:
          type: string
          maxLength: 180
    CreateCampaignTask:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 240
        priority:
          type: string
          enum: [low, normal, high, urgent]
        assigneeId:
          type: string
          format: uuid
        dueDate:
          type: string
          format: date
        metadata:
          type: object
          additionalProperties: true
    UpdateCampaignTaskStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [todo, in_progress, blocked, done]
    UpsertCampaignBudgetLine:
      type: object
      required: [category, allocated, spent]
      properties:
        category:
          type: string
          minLength: 1
          maxLength: 120
        allocated:
          type: number
          minimum: 0
        spent:
          type: number
          minimum: 0
        currency:
          type: string
          example: USD
    GenerateCampaignReport:
      type: object
      properties:
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
    CreateReportTemplate:
      type: object
      required: [workspaceId, name, type, format]
      properties:
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 180
        type:
          type: string
          enum: [campaign, analytics, listening, executive]
        format:
          type: string
          enum: [pdf, csv, xlsx, json]
        filters:
          type: object
          additionalProperties: true
        branding:
          type: object
          additionalProperties: true
    CreateScheduledReport:
      type: object
      required: [templateId, frequency, recipients]
      properties:
        templateId:
          type: string
          format: uuid
        frequency:
          type: string
          enum: [daily, weekly, monthly]
        recipients:
          type: array
          items:
            type: string
            format: email
    CreateReportExport:
      type: object
      required: [workspaceId, type, format]
      properties:
        workspaceId:
          type: string
          format: uuid
        type:
          type: string
          enum: [campaign, analytics, listening, executive]
        format:
          type: string
          enum: [pdf, csv, xlsx, json]
        templateId:
          type: string
          format: uuid
    CreateReportShareLink:
      type: object
      properties:
        expiresAt:
          type: string
          format: date-time
    UpdateNotificationPreferences:
      type: object
      properties:
        channelSettings:
          type: object
          additionalProperties:
            type: boolean
        digestFrequency:
          type: string
          enum: [instant, daily, weekly, muted]
        quietHours:
          type: object
          properties:
            enabled:
              type: boolean
            start:
              type: string
              example: "22:00"
            end:
              type: string
              example: "07:00"
            timezone:
              type: string
        mutedTypes:
          type: array
          items:
            type: string
    RouteNotification:
      type: object
      required: [workspaceId, userId, type, title, body]
      properties:
        workspaceId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        type:
          type: string
          enum: [publishing_failure, approval_request, trend_alert, performance_milestone, account_issue, system_alert, billing_alert, security_alert, mention, scheduled_reminder]
        title:
          type: string
        body:
          type: string
        priority:
          type: string
          enum: [low, normal, high, critical]
        metadata:
          type: object
          additionalProperties: true
    CreateListeningMonitor:
      type: object
      required: [workspaceId, type, query]
      properties:
        workspaceId:
          type: string
          format: uuid
        type:
          type: string
          enum: [brand, keyword, hashtag, competitor, influencer]
        query:
          type: string
          minLength: 1
          maxLength: 240
        platforms:
          type: array
          items:
            type: string
            enum: [x, instagram, facebook, linkedin, youtube, tiktok, reddit, pinterest, threads, mastodon, bluesky]
        alertThreshold:
          type: integer
          minimum: 0
          maximum: 100
    IngestSocialMention:
      type: object
      required: [workspaceId, monitorId, platform, author, content, sentiment, reach, engagement]
      properties:
        workspaceId:
          type: string
          format: uuid
        monitorId:
          type: string
          format: uuid
        platform:
          type: string
          enum: [x, instagram, facebook, linkedin, youtube, tiktok, reddit, pinterest, threads, mastodon, bluesky]
        author:
          type: string
          minLength: 1
          maxLength: 180
        content:
          type: string
          minLength: 1
          maxLength: 5000
        url:
          type: string
          format: uri
        sentiment:
          type: string
          enum: [negative, neutral, positive, mixed]
        reach:
          type: integer
          minimum: 0
        engagement:
          type: integer
          minimum: 0
        metadata:
          type: object
          additionalProperties: true
    ListeningMonitor:
      type: object
      required: [id, workspaceId, type, query, platforms, status, alertThreshold, createdBy, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        type:
          type: string
          enum: [brand, keyword, hashtag, competitor, influencer]
        query:
          type: string
        platforms:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, paused, archived]
        alertThreshold:
          type: integer
        createdBy:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SocialMention:
      type: object
      required: [id, workspaceId, monitorId, platform, author, content, sentiment, reach, engagement, detectedAt]
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        monitorId:
          type: string
          format: uuid
        platform:
          type: string
        author:
          type: string
        content:
          type: string
        url:
          type: string
          format: uri
        sentiment:
          type: string
          enum: [negative, neutral, positive, mixed]
        reach:
          type: integer
        engagement:
          type: integer
        detectedAt:
          type: string
          format: date-time
        metadata:
          type: object
          additionalProperties: true
    ListeningAlert:
      type: object
      required: [id, workspaceId, monitorId, severity, title, body, resolved, createdAt]
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        monitorId:
          type: string
          format: uuid
        mentionId:
          type: string
          format: uuid
        severity:
          type: string
          enum: [info, warning, critical]
        title:
          type: string
        body:
          type: string
        resolved:
          type: boolean
        createdAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
    GenerateContent:
      type: object
      required: [workspaceId, brief, platforms]
      properties:
        workspaceId:
          type: string
          format: uuid
        brief:
          type: string
          minLength: 10
          maxLength: 5000
        platforms:
          type: array
          minItems: 1
          items:
            type: string
        tone:
          type: string
        objective:
          type: string
        brandVoiceId:
          type: string
          format: uuid
    CreateSafetyPolicy:
      type: object
      required: [workspaceId, name]
      properties:
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
          maxLength: 180
        rules:
          type: object
          properties:
            blockedTerms:
              type: array
              items:
                type: string
            requiredDisclosures:
              type: array
              items:
                type: string
            industry:
              type: string
            maxRiskScore:
              type: number
              minimum: 0
              maximum: 1
    EvaluateContentSafety:
      type: object
      required: [workspaceId, text]
      properties:
        workspaceId:
          type: string
          format: uuid
        text:
          type: string
          minLength: 1
          maxLength: 10000
        source:
          type: string
          enum: [ai_generation, manual, post_review]
        sourceEntityId:
          type: string
          format: uuid
    ResolveModerationItem:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected, resolved]
        resolutionNote:
          type: string
          maxLength: 2000
    CreateBrandVoice:
      type: object
      required: [workspaceId, name]
      properties:
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        tone:
          type: object
          additionalProperties: true
        style:
          type: object
          additionalProperties: true
        vocabulary:
          type: object
          properties:
            preferredTerms:
              type: array
