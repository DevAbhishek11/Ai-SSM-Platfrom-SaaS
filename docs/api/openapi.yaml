openapi: 3.0.3
info:
  title: AI Social Media Management Platform API
  version: 0.1.0
  description: Initial REST contract for the enterprise social media management SaaS.
servers:
  - url: http://localhost:4000/api
security:
  - bearerAuth: []
  - apiKeyAuth: []
paths:
  /auth/login:
    post:
      tags: [auth]
      summary: Issue a short-lived access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        "201":
          description: Token response
        "401":
          description: Invalid credentials
  /auth/session:
    get:
      tags: [auth]
      summary: Validate bearer token and return principal
      responses:
        "200":
          description: Caller principal
        "401":
          description: Missing or invalid bearer token
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: API is alive
  /ready:
    get:
      tags: [health]
      summary: Readiness probe
      security: []
      responses:
        "200":
          description: API dependencies are configured
  /dashboard/overview:
    get:
      tags: [dashboard]
      summary: Workspace dashboard overview
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dashboard metrics, posts, accounts, trends, and alerts
  /workspaces:
    get:
      tags: [workspaces]
      summary: List caller workspaces
      responses:
        "200":
          description: Workspace list
  /workspaces/{id}:
    get:
      tags: [workspaces]
      summary: Get workspace
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace
        "404":
          description: Workspace not found
  /members:
    get:
      tags: [members]
      summary: List workspace team members
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Team members
  /members/invitations:
    get:
      tags: [members]
      summary: List workspace invitations
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace invitations
    post:
      tags: [members]
      summary: Invite a workspace member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteMember"
      responses:
        "201":
          description: Created invitation and one-time accept URL
  /members/invitations/{id}/resend:
    post:
      tags: [members]
      summary: Resend a pending invitation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Refreshed invitation and one-time accept URL
  /members/invitations/{id}/revoke:
    post:
      tags: [members]
      summary: Revoke a pending invitation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Revoked invitation
  /members/{memberId}/role:
    post:
      tags: [members]
      summary: Update a member role
      parameters:
        - in: path
          name: memberId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRole"
      responses:
        "201":
          description: Updated member
  /members/{memberId}/suspend:
    post:
      tags: [members]
      summary: Suspend a team member
      parameters:
        - in: path
          name: memberId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Suspended member
  /api-keys:
    get:
      tags: [api-keys]
      summary: List workspace API keys without raw secrets
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: API key metadata
    post:
      tags: [api-keys]
      summary: Create a scoped API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKey"
      responses:
        "201":
          description: API key metadata and one-time raw secret
  /api-keys/{id}/revoke:
    post:
      tags: [api-keys]
      summary: Revoke an active API key
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Revoked API key metadata
  /posts:
    get:
      tags: [posts]
      summary: List workspace posts
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Post list
    post:
      tags: [posts]
      summary: Create a post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePost"
      responses:
        "201":
          description: Created post
        "400":
          description: Invalid platform content
  /campaigns:
    get:
      tags: [campaigns]
      summary: List workspace campaigns
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Campaign list with operational summaries
  /campaigns/{id}:
    get:
      tags: [campaigns]
      summary: Get campaign details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Campaign details
        "404":
          description: Campaign not found
  /media/assets:
    get:
      tags: [media]
      summary: List workspace media assets
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Media assets
  /media/upload-intents:
    post:
      tags: [media]
      summary: Create an upload intent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId, fileName, fileType, fileSize]
              properties:
                workspaceId:
                  type: string
                  format: uuid
                fileName:
                  type: string
                fileType:
                  type: string
                fileSize:
                  type: integer
      responses:
        "201":
          description: Constrained upload URL and required headers
  /media/processing-jobs:
    get:
      tags: [media]
      summary: List media processing jobs
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Media processing job list
  /media/uploads/complete:
    post:
      tags: [media]
      summary: Complete an upload and create a processing job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uploadIntentId, checksumSha256]
              properties:
                uploadIntentId:
                  type: string
                  format: uuid
                checksumSha256:
                  type: string
      responses:
        "201":
          description: Created processing job
  /media/processing-jobs/{id}/process-next:
    post:
      tags: [media]
      summary: Advance a media processing job by one step
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated processing job
  /media/processing-jobs/{id}/fail:
    post:
      tags: [media]
      summary: Mark a media processing job as failed
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [errorMessage]
              properties:
                errorMessage:
                  type: string
                step:
                  type: string
      responses:
        "200":
          description: Failed processing job
  /notifications:
    get:
      tags: [notifications]
      summary: List user notifications
      parameters:
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notifications
  /notifications/{id}/read:
    patch:
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated notification
  /billing/plans:
    get:
      tags: [billing]
      summary: Plan limits and capabilities
      responses:
        "200":
          description: Pricing plan matrix
  /billing/usage:
    get:
      tags: [billing]
      summary: Workspace usage against plan limits
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace usage
  /billing/entitlements/check:
    get:
      tags: [billing]
      summary: Check projected workspace entitlement
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
        - in: query
          name: capability
          required: true
          schema:
            type: string
            enum: [workspaces, socialAccounts, postsThisMonth, aiGenerations, teamMembers, mediaStorageGb, apiAccess]
        - in: query
          name: increment
          schema:
            type: number
      responses:
        "200":
          description: Allowed/denied entitlement decision with current and projected usage
        "400":
          description: Invalid capability
  /webhooks/deliveries:
    get:
      tags: [webhooks]
      summary: List webhook deliveries
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Webhook deliveries
  /webhooks/deliveries/{id}/replay:
    post:
      tags: [webhooks]
      summary: Replay a pending or failed webhook delivery
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Delivery queued for replay
  /publishing/jobs:
    get:
      tags: [publishing]
      summary: List publishing jobs
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Publishing jobs with retry and connector state
  /publishing/jobs/enqueue:
    post:
      tags: [publishing]
      summary: Create idempotent publishing jobs for a post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId, postId]
              properties:
                workspaceId:
                  type: string
                  format: uuid
                postId:
                  type: string
                  format: uuid
                socialAccountIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                publishAt:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Created or existing publishing jobs
  /publishing/jobs/process-due:
    post:
      tags: [publishing]
      summary: Process due queued and retrying publishing jobs
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Processed job results
  /publishing/jobs/{id}/process:
    post:
      tags: [publishing]
      summary: Process a single publishing job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated publishing job
  /publishing/jobs/{id}/retry:
    post:
      tags: [publishing]
      summary: Schedule a failed publishing job for retry
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Publishing job scheduled for retry
  /workflow/posts/{postId}/timeline:
    get:
      tags: [workflow]
      summary: Get comments and workflow events for a post
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workflow timeline
  /workflow/posts/{postId}/submit:
    post:
      tags: [workflow]
      summary: Submit a draft post for review
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowComment"
      responses:
        "200":
          description: Updated post and timeline
  /workflow/posts/{postId}/approve:
    post:
      tags: [workflow]
      summary: Approve a post
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowComment"
      responses:
        "200":
          description: Updated post and timeline
  /workflow/posts/{postId}/request-changes:
    post:
      tags: [workflow]
      summary: Request changes on a post
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowComment"
      responses:
        "200":
          description: Updated post and timeline
  /workflow/posts/{postId}/schedule:
    post:
      tags: [workflow]
      summary: Schedule an approved post
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scheduledAt]
              properties:
                scheduledAt:
                  type: string
                  format: date-time
                comment:
                  type: string
      responses:
        "200":
          description: Updated post and timeline
  /workflow/posts/{postId}/cancel:
    post:
      tags: [workflow]
      summary: Cancel a scheduled post
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowComment"
      responses:
        "200":
          description: Updated post and timeline
  /ai/generate:
    post:
      tags: [ai]
      summary: Generate platform-specific post variants
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateContent"
      responses:
        "201":
          description: AI generation response with safety and quality metadata
  /analytics/summary:
    get:
      tags: [analytics]
      summary: Workspace analytics summary
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Analytics totals and recommendations
  /audit/logs:
    get:
      tags: [audit]
      summary: List tenant-scoped audit logs
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: entityType
          schema:
            type: string
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Audit log records
  /audit/summary:
    get:
      tags: [audit]
      summary: Audit event counts and risk signals
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Audit summary
  /audit/export:
    get:
      tags: [audit]
      summary: Export audit records for compliance review
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: JSON audit export with retention metadata
  /social/accounts:
    get:
      tags: [social]
      summary: Connected account list
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Social accounts
  /social/account-health:
    get:
      tags: [social]
      summary: Social account health
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Account health summary
  /social/platform-capabilities:
    get:
      tags: [social]
      summary: Supported platform capability matrix
      responses:
        "200":
          description: Platform capabilities
  /social/oauth/authorize:
    post:
      tags: [social]
      summary: Start a provider OAuth connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartOAuth"
      responses:
        "201":
          description: OAuth state and authorization URL
  /social/oauth/callback:
    post:
      tags: [social]
      summary: Consume OAuth callback state and connect an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompleteOAuth"
      responses:
        "201":
          description: Connected social account and consumed OAuth state
        "400":
          description: Expired or already consumed OAuth state
        "404":
          description: OAuth state not found
  /social/oauth/states:
    get:
      tags: [social]
      summary: OAuth state audit trail
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OAuth state list
  /social/accounts/{accountId}/refresh-token:
    post:
      tags: [social]
      summary: Refresh a social account token
      parameters:
        - in: path
          name: accountId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "201":
          description: Updated social account
        "404":
          description: Social account not found
  /social/accounts/{accountId}/validate-scopes:
    post:
      tags: [social]
      summary: Validate required provider scopes
      parameters:
        - in: path
          name: accountId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateScopes"
      responses:
        "201":
          description: Scope validation result
        "404":
          description: Social account not found
  /social/rate-limits:
    get:
      tags: [social]
      summary: Provider rate limit buckets
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Social provider rate limit buckets
  /social/connector-events:
    get:
      tags: [social]
      summary: Connector lifecycle events
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OAuth, token, scope, and connector health events
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    apiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    CreatePost:
      type: object
      required: [workspaceId, content]
      properties:
        workspaceId:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, in_review, revisions_needed, approved, scheduled, publishing, published, failed, archived]
        scheduledAt:
          type: string
          format: date-time
        aiGenerated:
          type: boolean
        content:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PostContentVariant"
    PostContentVariant:
      type: object
      required: [platform, text]
      properties:
        platform:
          type: string
          enum: [x, instagram, facebook, linkedin, youtube, tiktok, reddit, pinterest, threads, mastodon, bluesky]
        text:
          type: string
          maxLength: 65000
        hashtags:
          type: array
          items:
            type: string
        firstComment:
          type: string
        link:
          type: string
          format: uri
    InviteMember:
      type: object
      required: [workspaceId, email, role]
      properties:
        workspaceId:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          type: string
          enum: [owner, admin, manager, creator, reviewer, viewer, api_service_account]
        expiresInDays:
          type: integer
          minimum: 1
          maximum: 30
    UpdateMemberRole:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [owner, admin, manager, creator, reviewer, viewer, api_service_account]
    CreateApiKey:
      type: object
      required: [workspaceId, name, scopes]
      properties:
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        scopes:
          type: array
          minItems: 1
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
    GenerateContent:
      type: object
      required: [workspaceId, brief, platforms]
      properties:
        workspaceId:
          type: string
          format: uuid
        brief:
          type: string
          minLength: 10
          maxLength: 5000
        platforms:
          type: array
          minItems: 1
          items:
            type: string
        tone:
          type: string
        objective:
          type: string
        brandVoiceId:
          type: string
          format: uuid
    WorkflowComment:
      type: object
      required: [comment]
      properties:
        comment:
          type: string
          minLength: 1
          maxLength: 5000
    StartOAuth:
      type: object
      required: [workspaceId, platform]
      properties:
        workspaceId:
          type: string
          format: uuid
        platform:
          type: string
          enum: [x, instagram, facebook, linkedin, youtube, tiktok, reddit, pinterest, threads, mastodon, bluesky]
        redirectUri:
          type: string
          format: uri
        scopes:
          type: array
          items:
            type: string
    CompleteOAuth:
      type: object
      required: [state, code]
      properties:
        state:
          type: string
        code:
          type: string
        platformUserId:
          type: string
        username:
          type: string
        displayName:
          type: string
    ValidateScopes:
      type: object
      properties:
        requiredScopes:
          type: array
          items:
            type: string
    AuditLog:
      type: object
      required: [id, action, entityType, createdAt]
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        action:
          type: string
        entityType:
          type: string
        entityId:
          type: string
          format: uuid
        oldValues:
          type: object
          additionalProperties: true
        newValues:
          type: object
          additionalProperties: true
        ipAddress:
          type: string
        userAgent:
          type: string
        createdAt:
          type: string
          format: date-time
