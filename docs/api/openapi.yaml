openapi: 3.0.3
info:
  title: AI Social Media Management Platform API
  version: 0.1.0
  description: Initial REST contract for the enterprise social media management SaaS.
servers:
  - url: http://localhost:4000/api
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      tags: [auth]
      summary: Issue a short-lived access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        "201":
          description: Token response
        "401":
          description: Invalid credentials
  /auth/session:
    get:
      tags: [auth]
      summary: Validate bearer token and return principal
      responses:
        "200":
          description: Caller principal
        "401":
          description: Missing or invalid bearer token
  /health:
    get:
      tags: [health]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: API is alive
  /ready:
    get:
      tags: [health]
      summary: Readiness probe
      security: []
      responses:
        "200":
          description: API dependencies are configured
  /dashboard/overview:
    get:
      tags: [dashboard]
      summary: Workspace dashboard overview
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dashboard metrics, posts, accounts, trends, and alerts
  /workspaces:
    get:
      tags: [workspaces]
      summary: List caller workspaces
      responses:
        "200":
          description: Workspace list
  /workspaces/{id}:
    get:
      tags: [workspaces]
      summary: Get workspace
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace
        "404":
          description: Workspace not found
  /posts:
    get:
      tags: [posts]
      summary: List workspace posts
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Post list
    post:
      tags: [posts]
      summary: Create a post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePost"
      responses:
        "201":
          description: Created post
        "400":
          description: Invalid platform content
  /campaigns:
    get:
      tags: [campaigns]
      summary: List workspace campaigns
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Campaign list with operational summaries
  /campaigns/{id}:
    get:
      tags: [campaigns]
      summary: Get campaign details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Campaign details
        "404":
          description: Campaign not found
  /media/assets:
    get:
      tags: [media]
      summary: List workspace media assets
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Media assets
  /media/upload-intents:
    post:
      tags: [media]
      summary: Create an upload intent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId, fileName, fileType, fileSize]
              properties:
                workspaceId:
                  type: string
                  format: uuid
                fileName:
                  type: string
                fileType:
                  type: string
                fileSize:
                  type: integer
      responses:
        "201":
          description: Constrained upload URL and required headers
  /notifications:
    get:
      tags: [notifications]
      summary: List user notifications
      parameters:
        - in: query
          name: userId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notifications
  /notifications/{id}/read:
    patch:
      tags: [notifications]
      summary: Mark notification as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated notification
  /billing/plans:
    get:
      tags: [billing]
      summary: Plan limits and capabilities
      responses:
        "200":
          description: Pricing plan matrix
  /billing/usage:
    get:
      tags: [billing]
      summary: Workspace usage against plan limits
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace usage
  /webhooks/deliveries:
    get:
      tags: [webhooks]
      summary: List webhook deliveries
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Webhook deliveries
  /webhooks/deliveries/{id}/replay:
    post:
      tags: [webhooks]
      summary: Replay a pending or failed webhook delivery
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Delivery queued for replay
  /ai/generate:
    post:
      tags: [ai]
      summary: Generate platform-specific post variants
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateContent"
      responses:
        "201":
          description: AI generation response with safety and quality metadata
  /analytics/summary:
    get:
      tags: [analytics]
      summary: Workspace analytics summary
      parameters:
        - in: query
          name: workspaceId
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Analytics totals and recommendations
  /social/accounts:
    get:
      tags: [social]
      summary: Connected account list
      responses:
        "200":
          description: Social accounts
  /social/account-health:
    get:
      tags: [social]
      summary: Social account health
      responses:
        "200":
          description: Account health summary
  /social/platform-capabilities:
    get:
      tags: [social]
      summary: Supported platform capability matrix
      responses:
        "200":
          description: Platform capabilities
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreatePost:
      type: object
      required: [workspaceId, content]
      properties:
        workspaceId:
          type: string
          format: uuid
        campaignId:
          type: string
          format: uuid
        status:
          type: string
          enum: [draft, in_review, revisions_needed, approved, scheduled, publishing, published, failed, archived]
        scheduledAt:
          type: string
          format: date-time
        aiGenerated:
          type: boolean
        content:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/PostContentVariant"
    PostContentVariant:
      type: object
      required: [platform, text]
      properties:
        platform:
          type: string
          enum: [x, instagram, facebook, linkedin, youtube, tiktok, reddit, pinterest, threads, mastodon, bluesky]
        text:
          type: string
          maxLength: 65000
        hashtags:
          type: array
          items:
            type: string
        firstComment:
          type: string
        link:
          type: string
          format: uri
    GenerateContent:
      type: object
      required: [workspaceId, brief, platforms]
      properties:
        workspaceId:
          type: string
          format: uuid
        brief:
          type: string
          minLength: 10
          maxLength: 5000
        platforms:
          type: array
          minItems: 1
          items:
            type: string
        tone:
          type: string
        objective:
          type: string
        brandVoiceId:
          type: string
          format: uuid
